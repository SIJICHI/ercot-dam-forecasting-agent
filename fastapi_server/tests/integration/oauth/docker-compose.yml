services:
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: mock-oauth2-server
    ports:
      - "18881:8080"
    environment:
      SERVER_PORT: 8080
      LOG_LEVEL: INFO
      JSON_CONFIG: |
        {
          "interactiveLogin": false,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "google",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "authorization_code",
                  "claims": {
                    "sub": "google-test-user-123",
                    "email": "testuser@google.example.com",
                    "email_verified": true,
                    "name": "Test User",
                    "given_name": "Test",
                    "family_name": "User",
                    "picture": "https://example.com/photo.jpg"
                  }
                }
              ]
            },
            {
              "issuerId": "box",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "authorization_code",
                  "claims": {
                    "sub": "box-test-user-456",
                    "login": "testuser@box.example.com",
                    "name": "Box Test User",
                    "id": "456"
                  }
                }
              ]
            },
            {
              "issuerId": "microsoft",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "authorization_code",
                  "claims": {
                    "sub": "microsoft-test-user-789",
                    "email": "testuser@microsoft.example.com",
                    "name": "Microsoft Test User",
                    "preferred_username": "testuser@microsoft.example.com"
                  }
                }
              ]
            }
          ]
        }

